<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <title>View PDF — Prep</title>
    <meta name="description" content="View preparation PDF online.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .pdf-viewer-wrap {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .pdf-frame-wrap {
            position: relative;
            width: 100%;
            height: 80vh;
            background: #222;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .viewer-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .download-btn {
            background: var(--accent, #3b82f6);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s;
        }
        .download-btn:hover {
            transform: translateY(-2px);
            background: var(--accent-hover, #2563eb);
        }
    </style>
</head>

<body>

    <div class="pdf-viewer-wrap">
        <div class="breadcrumb">
            <a href="../index.html">Home</a>
            <span class="sep">›</span>
            <a href="pdfs.html?name=reasoning">Reasoning PDFs</a>
            <span class="sep">›</span>
            <span class="current" id="pdf-breadcrumb">View PDF</span>
        </div>

        <div class="viewer-actions">
            <h2 class="player-title" id="pdf-viewer-title">Loading PDF...</h2>
            <a href="#" id="download-link" class="download-btn" download>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Download
            </a>
        </div>

        <div class="pdf-frame-wrap">
            <iframe id="pdf-frame"></iframe>
        </div>
    </div>

    <script src="../js/videoData.js"></script>
    <script src="../js/navbar.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const params = new URLSearchParams(window.location.search);
            const pdfUrl = params.get("url");
            const title = params.get("title");

            if (pdfUrl) {
                // Using Google Docs Viewer for better cross-browser compatibility if needed, 
                // but standard iframe for local/direct PDFs is often fine.
                // For now, direct iframe.
                document.getElementById("pdf-frame").src = `../${pdfUrl}`;
                document.getElementById("download-link").href = `../${pdfUrl}`;
                document.getElementById("pdf-viewer-title").textContent = decodeURIComponent(title || "Untitled PDF");
                document.getElementById("pdf-breadcrumb").textContent = decodeURIComponent(title || "View PDF");
            } else {
                document.getElementById("pdf-viewer-title").textContent = "PDF not found.";
            }
        });
    </script>
</body>

</html>
