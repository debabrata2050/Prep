<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <title>Prep — Exam Preparation</title>
  <meta name="description" content="Free video lectures for exam preparation — English, Quant, Reasoning, and IT.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <header class="hero">
    <div class="hero-glow"></div>
    <div class="hero-content">
      <span class="badge">Academic Excellence</span>
      <h1>Your exam prep, <br><span class="highlight">simplified.</span></h1>
      <p>Premium video lectures for non-tech students. Pick a subject to begin your focused study journey.</p>
    </div>
  </header>

  <main class="container section-wrap">
    <h2 class="section-title">Explore Subjects</h2>
    <div class="subjects-grid" id="subject-cards"></div>
  </main>

  <footer class="footer">Prep — built for learners</footer>

  <script src="js/videoData.js"></script>
  <script src="js/navbar.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById("subject-cards");
      subjects.forEach(s => {
        const a = document.createElement("a");
        a.href = s.link;
        a.className = "s-card";
        a.innerHTML = `
          <div class="thumb-wrap">
            <img class="thumb" loading="lazy" src="${s.thumbnail}" alt="${s.name}">
          </div>
          <div class="body">
            <span class="name">${s.name}</span>
            <span class="arrow">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
              </svg>
            </span>
          </div>
        `;
        container.appendChild(a);
      });
    });
  </script>
</body>

</html>
