<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <title>Prep — Exam Preparation</title>
  <meta name="description" content="Free video lectures for exam preparation — English, Quant, Reasoning, and IT.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <header class="hero">
    <div class="hero-glow"></div>
    <div class="hero-content">
      <span class="badge">Academic Excellence</span>
      <h1>Your exam prep, <br><span class="highlight">simplified.</span></h1>
      <p>Premium video lectures for non-tech students. Pick a subject to begin your focused study journey.</p>
    </div>
  </header>

  <main class="container">
    <section class="section-wrap">
      <h2 class="section-title">Explore Subjects</h2>
      <div class="subjects-grid" id="subject-cards"></div>
    </section>

    <section class="section-wrap" style="padding-top: 0;">
      <h2 class="section-title">Explore PDFs</h2>
      <div class="subjects-grid" id="pdf-cards"></div>
    </section>
  </main>



  <script src="js/videoData.js"></script>
  <script src="js/navbar.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const subjectContainer = document.getElementById("subject-cards");
      const pdfContainer = document.getElementById("pdf-cards");

      // Render Subjects
      subjects.forEach(s => {
        const a = document.createElement("a");
        a.href = s.link;
        a.className = "s-card";
        a.innerHTML = `
          <div class="thumb-wrap">
            <img class="thumb" loading="lazy" src="${s.thumbnail}" alt="${s.name}">
            <div class="v-badge">VIDEO LECTURES</div>
          </div>
          <div class="body">
            <span class="name">${s.name}</span>
            <span class="arrow">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
              </svg>
            </span>
          </div>
        `;
        subjectContainer.appendChild(a);
      });

      // Render PDF Section Card
      const pCard = document.createElement("a");
      pCard.href = "pages/pdfs.html?name=reasoning";
      pCard.className = "s-card pdf-card-special";
      pCard.innerHTML = `
        <div class="thumb-wrap">
          <img class="thumb" loading="lazy" src="assets/pdf-thumb.png" alt="PDF Notes">
          <div class="pdf-badge">PDF NOTES</div>
        </div>
        <div class="body">
          <span class="name">Reasoning PDFs</span>
          <span class="arrow">
             <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
              </svg>
          </span>
        </div>
      `;
      pdfContainer.appendChild(pCard);
    });
  </script>
</body>

</html>
