<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <title>Play Video — Prep</title>
  <meta name="description" content="Watch exam preparation video lectures.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="player-wrap">
    <div class="breadcrumb">
      <a href="index.html">Home</a>
      <span class="sep">›</span>
      <a href="#" id="subject-breadcrumb">Subject</a>
      <span class="sep">›</span>
      <span class="current" id="video-breadcrumb">Video</span>
    </div>
    <h2 class="player-title" id="video-title">Loading...</h2>
    <div class="frame-wrap">
      <iframe id="video-frame" allowfullscreen allow="autoplay"></iframe>
    </div>
  </div>



  <script src="js/videoData.js"></script>
  <script src="js/navbar.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const params = new URLSearchParams(window.location.search);
      const videoId = params.get("id");
      const title = params.get("title");
      const subject = params.get("subject");

      if (videoId && /^[a-zA-Z0-9]+$/.test(videoId)) {
        document.getElementById("video-frame").src =
          `https://www.dailymotion.com/embed/video/${videoId}?autoplay=1`;
        document.getElementById("video-title").textContent = decodeURIComponent(title || "Untitled");
      } else {
        document.getElementById("video-title").textContent = "Video not found.";
      }

      const bc = document.getElementById("subject-breadcrumb");
      const vc = document.getElementById("video-breadcrumb");

      if (subject) {
        const s = decodeURIComponent(subject);
        bc.textContent = s;
        bc.href = `pages/subject.html?name=${s.toLowerCase()}`;
      } else {
        bc.textContent = "Subject";
        bc.href = "index.html";
      }

      if (title) vc.textContent = decodeURIComponent(title);
    });
  </script>
</body>

</html>
